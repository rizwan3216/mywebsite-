<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RizwanXBrand</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background: radial-gradient(circle at center, #000000 0%, #02150d 45%, #000000 100%);
      color:#00ff88;
      font-family:monospace;
      text-align:center;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background-image:
      linear-gradient(rgba(0,255,136,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.06) 1px, transparent 1px);
      background-size:40px 40px;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, rgba(0,255,136,0.08), transparent 60%);
      z-index:-1;
    }

    .container{
      width:100%;
      max-width:900px;
      margin:auto;
      padding:70px 20px 50px;
    }

    .light{
      font-size:70px;
      margin-bottom:10px;
      text-shadow:0 0 15px #ffd000, 0 0 30px #ffd000;
    }

    .title{
      font-size:58px;
      color:#00ff88;
      text-shadow:0 0 15px #00ff88, 0 0 30px #00ff88, 0 0 50px #00ff88;
      margin-bottom:20px;
      word-break:break-word;
    }

    .subtitle{
      font-size:20px;
      color:#cffff0;
      margin-top:25px;
      margin-bottom:40px;
      text-shadow:0 0 10px rgba(0,255,136,0.35);
    }

    .btn{
      display:inline-block;
      margin:12px 8px;
      padding:16px 30px;
      min-width:240px;
      background:#00ff88;
      color:#000;
      text-decoration:none;
      font-weight:bold;
      border-radius:14px;
      box-shadow:0 0 18px #00ff88;
      transition:0.3s ease;
      font-size:20px;
    }

    .btn:hover{
      transform:scale(1.05);
      background:#ffffff;
      box-shadow:0 0 25px #00ff88;
    }

    .channel{
      display:inline-block;
      margin:12px 8px;
      padding:15px 28px;
      min-width:240px;
      background:transparent;
      color:#00ff88;
      border:1px solid #00ff88;
      text-decoration:none;
      font-weight:bold;
      border-radius:14px;
      box-shadow:0 0 12px rgba(0,255,136,0.25);
      transition:0.3s ease;
      font-size:18px;
    }

    .channel:hover{
      background:#00ff88;
      color:#000;
      transform:scale(1.05);
    }

    .box{
      width:100%;
      max-width:650px;
      margin:35px auto 0;
      padding:20px;
      border:1px solid rgba(0,255,136,0.35);
      border-radius:16px;
      background:rgba(0,255,136,0.04);
      box-shadow:0 0 18px rgba(0,255,136,0.08);
    }

    .box p{
      font-size:17px;
      color:#d8fff1;
      line-height:1.7;
    }

    .footer{
      margin-top:90px;
      font-size:16px;
      color:#a8a8a8;
      text-shadow:0 0 10px rgba(255,255,255,0.08);
    }

    .brand{
      color:#ffffff;
    }

    @media(max-width:700px){
      .light{
        font-size:52px;
      }

      .title{
        font-size:38px;
      }

      .subtitle{
        font-size:18px;
      }

      .btn,.channel{
        min-width:90%;
        font-size:18px;
      }

      .box p{
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="light">⚡</div>

    <h1 class="title">RIZWANXBRAND</h1>

    <div class="light">⚡</div>

    <p class="subtitle">Welcome To Rizwan Home</p>

    <a class="btn" href="https://wa.me/923060729141">Contact On WhatsApp</a>

    <br>

    <a class="channel" href="https://whatsapp.com/channel/0029VbCoOFkFMqrSCwFxhQ0j">
      Follow the Sms Updates Family 💞
    </a>

    <div class="box">
      <p>
        Professional neon tech styled personal page for RizwanXBrand.<br>
        Connect on WhatsApp and follow the official channel for latest SMS updates.
      </p>
    </div>

    <div class="footer">
      Made With <span class="brand">RizwanXBrand</span> 💚
    </div>

  </div>
</body>
</html>
